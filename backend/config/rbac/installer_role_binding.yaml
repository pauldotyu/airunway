# Optional binding for dashboard installer mode. Apply only when you want the
# dashboard to perform automatic provider installation with Helm/kubectl.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: airunway-installer
  labels:
    app.kubernetes.io/name: airunway
    app.kubernetes.io/component: installer-rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: airunway-installer
subjects:
  - kind: ServiceAccount
    name: airunway
    namespace: airunway-system
