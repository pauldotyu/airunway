apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: airunway
  labels:
    app.kubernetes.io/name: airunway
rules:
  # Core API - Pods, Services (full CRUD for deployment management)
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Secrets and ConfigMaps (needed for HF tokens, config storage)
  # Note: secret delete is scoped per-namespace via Roles below
  - apiGroups: [""]
    resources:
      - secrets
      - configmaps
    verbs: ["get", "list", "watch", "create", "update", "patch"]

  # Events (needed for deployment event display)
  - apiGroups: [""]
    resources:
      - events
    verbs: ["list", "watch"]

  # Namespaces (read + create)
  - apiGroups: [""]
    resources:
      - namespaces
    verbs: ["get", "list", "watch", "create"]

  # Apps API - Deployments, ReplicaSets
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # AI Runway CRDs - ModelDeployments
  - apiGroups: ["airunway.ai"]
    resources:
      - modeldeployments
      - modeldeployments/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # AI Runway CRDs - InferenceProviderConfigs (read + delete for uninstall)
  - apiGroups: ["airunway.ai"]
    resources:
      - inferenceproviderconfigs
    verbs: ["get", "list", "watch", "delete"]

  # CRD management (needed for provider detection)
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list"]

  # NVIDIA Dynamo CRDs
  - apiGroups: ["nvidia.com"]
    resources:
      - dynamographdeployments
      - dynamographdeployments/status
      - clusterpolicies
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # KubeRay CRDs
  - apiGroups: ["ray.io"]
    resources:
      - rayservices
      - rayservices/status
      - rayclusters
      - rayclusters/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Gateway API - Gateways and HTTPRoutes (read-only for status display)
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gateways
      - httproutes
    verbs: ["get", "list", "watch"]

  # Gateway API Inference Extension - InferencePools (read-only for status display)
  - apiGroups: ["inference.networking.k8s.io"]
    resources:
      - inferencepools
    verbs: ["get", "list", "watch"]

  # Storage - for PVCs if needed
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["get", "list", "watch"]

  # Node info for GPU detection
  - apiGroups: [""]
    resources:
      - nodes
    verbs: ["get", "list", "watch"]
