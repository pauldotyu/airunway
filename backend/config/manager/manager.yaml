apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeairunway
  labels:
    app.kubernetes.io/name: kubeairunway
    app.kubernetes.io/instance: kubeairunway
    app.kubernetes.io/component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubeairunway
      app.kubernetes.io/instance: kubeairunway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubeairunway
        app.kubernetes.io/instance: kubeairunway
        app.kubernetes.io/component: dashboard
    spec:
      serviceAccountName: kubeairunway
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: kubeairunway
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          env:
            - name: PORT
              value: "3001"
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: kubeairunway
  labels:
    app.kubernetes.io/name: kubeairunway
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: kubeairunway
    app.kubernetes.io/instance: kubeairunway
