apiVersion: kubeairunway.ai/v1alpha1
kind: ModelDeployment
metadata:
  name: model-a
  namespace: default
spec:
  model:
    source: custom
  resources:
    cpu: "4"
  image: "ghcr.io/kaito-project/aikit/llama3.2:1b"
  gateway:
    enabled: true
    modelName: "llama-3.2-1b-instruct"
    # BYO HTTPRoute — the controller skips auto-creating an HTTPRoute
    httpRouteRef: "model-a-route"
