# BYO (Bring Your Own) HTTPRoutes for the two ModelDeployments.
#
# Each route matches requests where BBR has set the X-Gateway-Model-Name
# header to the corresponding model's served name, then forwards to the
# auto-created InferencePool for that ModelDeployment.
#
# Using BYO routes (via spec.gateway.httpRouteRef) instead of auto-created ones
# prevents the controller from creating conflicting routes and gives full
# control over routing rules.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: model-a-route
  namespace: default
spec:
  parentRefs:
    - name: inference-gateway
      namespace: default
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
          headers:
            - type: Exact
              name: X-Gateway-Model-Name
              value: llama-3.2-1b-instruct
      backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: model-a
      timeouts:
        request: 300s
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: model-b-route
  namespace: default
spec:
  parentRefs:
    - name: inference-gateway
      namespace: default
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
          headers:
            - type: Exact
              name: X-Gateway-Model-Name
              value: gemma-2-2b-instruct
      backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: model-b
      timeouts:
        request: 300s
