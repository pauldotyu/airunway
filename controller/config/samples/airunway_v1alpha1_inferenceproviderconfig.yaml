# Example: KAITO provider registration (typically created by kaito-provider controller)
# Installation and documentation metadata are stored in annotations, not in spec.
apiVersion: airunway.ai/v1alpha1
kind: InferenceProviderConfig
metadata:
  labels:
    app.kubernetes.io/name: airunway
    app.kubernetes.io/managed-by: kustomize
  name: kaito
  annotations:
    airunway.ai/documentation: "https://github.com/kaito-project/airunway/tree/main/docs/providers/kaito.md"
spec:
  capabilities:
    engines:
      - vllm
      - llamacpp
    servingModes:
      - aggregated
    cpuSupport: true
    gpuSupport: true
  selectionRules:
    - condition: "!has(spec.resources.gpu) || spec.resources.gpu.count == 0"
      priority: 100
    - condition: "spec.engine.type == 'llamacpp'"
      priority: 100
---
# Example: Dynamo provider registration (typically created by dynamo-provider controller)
apiVersion: airunway.ai/v1alpha1
kind: InferenceProviderConfig
metadata:
  labels:
    app.kubernetes.io/name: airunway
    app.kubernetes.io/managed-by: kustomize
  name: dynamo
  annotations:
    airunway.ai/documentation: "https://github.com/kaito-project/airunway/tree/main/docs/providers/dynamo.md"
spec:
  capabilities:
    engines:
      - vllm
      - sglang
      - trtllm
    servingModes:
      - aggregated
      - disaggregated
    cpuSupport: false
    gpuSupport: true
    gateway:
      inferencePoolNamePattern: "{name}-pool"
      inferencePoolNamespace: "{namespace}"
  selectionRules:
    - condition: "spec.engine.type == 'trtllm'"
      priority: 100
    - condition: "spec.engine.type == 'sglang'"
      priority: 100
    - condition: "has(spec.serving) && spec.serving.mode == 'disaggregated'"
      priority: 90
    - condition: "has(spec.resources.gpu) && spec.resources.gpu.count > 0 && spec.engine.type == 'vllm'"
      priority: 50
---
# Example: KubeRay provider registration (typically created by kuberay-provider controller)
apiVersion: airunway.ai/v1alpha1
kind: InferenceProviderConfig
metadata:
  labels:
    app.kubernetes.io/name: airunway
    app.kubernetes.io/managed-by: kustomize
  name: kuberay
  annotations:
    airunway.ai/documentation: "https://github.com/kaito-project/airunway/tree/main/docs/providers/kuberay.md"
spec:
  capabilities:
    engines:
      - vllm
    servingModes:
      - aggregated
      - disaggregated
    cpuSupport: false
    gpuSupport: true
  selectionRules:
    - condition: "has(spec.resources.gpu) && spec.resources.gpu.count > 1 && spec.engine.type == 'vllm'"
      priority: 80
---
